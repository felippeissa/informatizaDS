<div class="gp-page">

    <!-- Cabeçalho -->
    <div class="ds-page-header gp-header-bar">
        <h2 class="ds-page-title">Projetos</h2>
        <p-button label="Novo projeto" icon="pi pi-plus" (onClick)="novo()" />
    </div>

    <!-- Card de filtros -->
    <div class="gp-filtros">
        <div class="gp-filtros-grid">
            <div class="gp-filtro-field">
                <label>Nome do projeto</label>
                <input pInputText [ngModel]="fNome()" (ngModelChange)="fNome.set($event)"
                       placeholder="Buscar por nome..." class="gp-filtro-input" />
            </div>
            <div class="gp-filtro-field">
                <label>Status</label>
                <p-select [options]="statusOpcoes" [ngModel]="fStatus()" (ngModelChange)="fStatus.set($event)"
                          optionLabel="label" optionValue="value" [showClear]="true"
                          placeholder="Todos" styleClass="gp-filtro-input" />
            </div>
            <div class="gp-filtro-field">
                <label>Sincronização</label>
                <p-select [options]="sincOpcoes" [ngModel]="fSinc()" (ngModelChange)="fSinc.set($event)"
                          optionLabel="label" optionValue="value" [showClear]="true"
                          placeholder="Todas" styleClass="gp-filtro-input" />
            </div>
        </div>
        <div class="gp-filtros-acoes">
            <p-button label="Limpar filtros" icon="pi pi-times" severity="secondary" [outlined]="true"
                      (onClick)="limpar()" />
            <p-button label="Filtrar" icon="pi pi-filter" (onClick)="filtrar()" />
        </div>
    </div>

    <!-- Tabela de projetos -->
    <div class="gp-card">
        <p-table [value]="filtrados()" styleClass="p-datatable-sm ds-table"
                 [rows]="10" [paginator]="true"
                 [showCurrentPageReport]="true"
                 currentPageReportTemplate="Mostrando {first} - {last} de {totalRecords} resultados"
                 dataKey="id">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="nome">Nome do projeto <p-sortIcon field="nome" /></th>
                    <th pSortableColumn="status" style="width:10rem">Status <p-sortIcon field="status" /></th>
                    <th pSortableColumn="sincronizacao" style="width:15rem">Sincronização <p-sortIcon field="sincronizacao" /></th>
                    <th pSortableColumn="ultimaPublicacao" style="width:12rem">Última publicação <p-sortIcon field="ultimaPublicacao" /></th>
                    <th style="width:7rem">Ações</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-p>
                <tr class="gp-row" (click)="abrir(p)">
                    <td>
                        <div class="gp-cell-projeto">
                            <span class="gp-nome">{{ p.nome }}</span>
                            <span class="gp-desc">{{ p.descricao }}</span>
                        </div>
                    </td>
                    <td>
                        <span class="gp-badge" [style.background]="bgStatus(p.status)" [style.color]="corStatus(p.status)">
                            {{ labelStatus(p.status) }}
                        </span>
                    </td>
                    <td>
                        <span class="gp-badge gp-badge--icon"
                              [style.background]="bgSinc(p.sincronizacao)" [style.color]="corSinc(p.sincronizacao)">
                            <i class="pi" [class]="iconSinc(p.sincronizacao)"></i> {{ labelSinc(p.sincronizacao) }}
                        </span>
                    </td>
                    <td>
                        <span class="gp-sinc"><i class="pi pi-clock"></i> {{ p.ultimaPublicacao }}</span>
                    </td>
                    <td>
                        <div class="ds-acoes-row">
                            <p-button icon="pi pi-arrow-up-right" [rounded]="true" [text]="true"
                                      pTooltip="Abrir workspace" tooltipPosition="top"
                                      (onClick)="$event.stopPropagation(); abrir(p)" />
                            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true"
                                      pTooltip="Editar projeto" tooltipPosition="top"
                                      (onClick)="$event.stopPropagation(); editar(p)" />
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="5">
                        <div class="gp-empty">
                            <i class="pi pi-folder-open"></i>
                            <p>Nenhum projeto encontrado com os filtros aplicados</p>
                            <p-button label="Limpar filtros" icon="pi pi-times" [outlined]="true" (onClick)="limpar()" />
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
