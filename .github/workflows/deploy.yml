name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Show environment
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install 2>&1

      - name: Build
        run: npx ng build --base-href /informatizaDS/ 2>&1
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy 404.html for SPA routing
        run: cp dist/sakai-ng/browser/index.html dist/sakai-ng/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/sakai-ng/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
